<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intake Approvals Dashboard</title>
<style>
  * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 0; }
  body { background: #F4F5F7; padding: 24px; color: #172B4D; }
  .wrap { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
  .metrics { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .metric { background: #fff; border-radius: 8px; padding: 14px 18px; flex: 1; min-width: 130px; border: 1px solid #DFE1E6; }
  .metric-label { font-size: 11px; color: #6B778C; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
  .metric-value { font-size: 24px; font-weight: 600; color: #172B4D; }
  .metric-value.warn { color: #FF8B00; }
  .tabs { display: flex; border-bottom: 2px solid #DFE1E6; margin-bottom: 18px; }
  .tab { background: none; border: none; padding: 8px 18px; font-size: 13px; color: #6B778C; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; font-weight: 500; }
  .tab.active { color: #0052CC; border-bottom-color: #0052CC; }
  .card { background: #fff; border-radius: 8px; border: 1px solid #DFE1E6; overflow: hidden; }
  .banner { background: #FFF7D6; border: 1px solid #FF991F; border-radius: 6px; padding: 10px 14px; font-size: 13px; color: #974F0C; margin-bottom: 16px; display: none; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #F4F5F7; color: #6B778C; font-weight: 600; text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; border-bottom: 2px solid #DFE1E6; }
  td { padding: 9px 12px; border-bottom: 1px solid #F4F5F7; color: #172B4D; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FAFBFC; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 12px; }
  .g { background: #E3FCEF; color: #006644; }
  .a { background: #FFF7D6; color: #974F0C; }
  .r { background: #FFEBE6; color: #BF2600; }
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar { height: 6px; border-radius: 3px; background: #DFE1E6; flex: 1; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .updated { font-size: 11px; color: #6B778C; margin-top: 12px; text-align: right; }
  .loading { text-align: center; padding: 60px; color: #6B778C; font-size: 14px; }
  .error { background: #FFEBE6; border-radius: 6px; padding: 14px; color: #BF2600; font-size: 13px; margin-top: 12px; }
  .empty { text-align: center; padding: 40px; color: #6B778C; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Intake approvals dashboard — 2026</h1>
  <div id="loading" class="loading">Loading live data from Google Sheets…</div>
  <div id="main" style="display:none">
    <div class="banner" id="banner"></div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Total approved</div><div class="metric-value" id="m-approved">—</div></div>
      <div class="metric"><div class="metric-label">Total reviewed</div><div class="metric-value" id="m-reviewed">—</div></div>
      <div class="metric"><div class="metric-label">Approval rate</div><div class="metric-value" id="m-rate">—</div></div>
      <div class="metric"><div class="metric-label">Invalid entries</div><div class="metric-value warn" id="m-flags">—</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('week',this)">By week</button>
      <button class="tab" onclick="showTab('month',this)">By month</button>
      <button class="tab" onclick="showTab('firm',this)">By law firm</button>
      <button class="tab" onclick="showTab('flags',this)">Flagged entries</button>
    </div>
    <div class="card">
      <div id="week"></div>
      <div id="month" style="display:none"></div>
      <div id="firm" style="display:none"></div>
      <div id="flags" style="display:none"></div>
    </div>
    <div class="updated" id="updated"></div>
  </div>
  <div id="err" class="error" style="display:none"></div>
</div>
<script>
var SCRIPT_URL = 'https://script.google.com/a/macros/demandx.ai/s/AKfycbwB739xHsyPJixFk2-p8V1z2z8BUVYkTQn90MMvQyXk7uXvAoYWFsKeD7Z8qjAfWnRL/exec';
var TOKEN = 'performek-intake-2026';
function badge(v, hi, mid) {
  return '<span class="badge ' + (v >= hi ? 'g' : v >= mid ? 'a' : 'r') + '">' + v + '</span>';
}
function bar(rate) {
  var color = rate >= 80 ? '#36B37E' : rate >= 65 ? '#FF991F' : '#FF5630';
  return '<div class="bar-wrap"><div class="bar"><div class="bar-fill" style="width:' + rate + '%;background:' + color + '"></div></div><span style="font-size:12px;min-width:34px">' + rate + '%</span></div>';
}
function showTab(name, btn) {
  ['week','month','firm','flags'].forEach(function(t) {
    document.getElementById(t).style.display = t === name ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}
function head(cols) {
  return '<thead><tr>' + cols.map(function(c) { return '<th>' + c + '</th>'; }).join('') + '</tr></thead>';
}
function render(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('m-approved').textContent = d.totalApproved.toLocaleString();
  document.getElementById('m-reviewed').textContent = d.totalReviewed.toLocaleString();
  document.getElementById('m-rate').textContent = d.approvalRate + '%';
  document.getElementById('m-flags').textContent = d.flaggedCount;
  if (d.flaggedCount > 0) {
    var b = document.getElementById('banner');
    b.textContent = '⚠️ ' + d.flaggedCount + ' invalid product entr' + (d.flaggedCount > 1 ? 'ies' : 'y') + ' detected — excluded from all counts. See Flagged entries tab.';
    b.style.display = 'block';
  }
  var wRows = d.byWeek.map(function(r) {
    return '<tr><td><strong>Week ' + r.week + '</strong></td><td>' + r.noIssues + '</td><td>' + r.withIssues + '</td><td>' + badge(r.approved,70,40) + '</td><td>' + r.rework + '</td><td>' + r.reject + '</td><td>' + bar(r.rate) + '</td></tr>';
  }).join('');
  document.getElementById('week').innerHTML = '<table>' + head(['Week','No issues','With issues','Total approved','Rework','Reject','Approval rate']) + '<tbody>' + wRows + '</tbody></table>';
  var mRows = d.byMonth.map(function(r) {
    return '<tr><td><strong>' + r.month + '</strong></td><td>' + r.noIssues + '</td><td>' + r.withIssues + '</td><td>' + badge(r.approved,250,150) + '</td><td>' + r.rework + '</td><td>' + r.reject + '</td><td>' + bar(r.rate) + '</td></tr>';
  }).join('');
  document.getElementById('month').innerHTML = '<table>' + head(['Month','No issues','With issues','Total approved','Rework','Reject','Approval rate']) + '<tbody>' + mRows + '</tbody></table>';
  var fRows = d.byFirm.map(function(r) {
    return '<tr><td><strong>' + r.firm + '</strong></td><td>' + r.noIssues + '</td><td>' + r.withIssues + '</td><td>' + badge(r.approved,200,50) + '</td><td>' + r.rework + '</td><td>' + r.reject + '</td><td>' + bar(r.rate) + '</td></tr>';
  }).join('');
  document.getElementById('firm').innerHTML = '<table>' + head(['Law firm','No issues','With issues','Total approved','Rework','Reject','Approval rate']) + '<tbody>' + fRows + '</tbody></table>';
  if (!d.flagged || !d.flagged.length) {
    document.getElementById('flags').innerHTML = '<div class="empty">✅ No invalid entries — all firm-product combinations are valid.</div>';
  } else {
    var flRows = d.flagged.map(function(r) {
      return '<tr><td>' + r.date + '</td><td>W' + r.week + '</td><td>' + r.firm + '</td><td><span class="badge r">' + r.product + '</span></td><td style="color:#6B778C">' + r.valid + '</td><td>' + r.status + '</td></tr>';
    }).join('');
    document.getElementById('flags').innerHTML = '<table>' + head(['Date','Week','Law firm','Product entered','Valid products','Status']) + '<tbody>' + flRows + '</tbody></table>';
  }
  var upd = new Date(d.lastUpdated);
  document.getElementById('updated').textContent = 'Last refreshed: ' + upd.toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' });
}
window.dashboardCallback = function(d) {
  clearTimeout(window._cbTimeout);
  if (d.error) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err').style.display = 'block';
    document.getElementById('err').textContent = 'Error: ' + d.error;
    return;
  }
  render(d);
};
function load() {
  window._cbTimeout = setTimeout(function() {
    if (document.getElementById('main').style.display === 'none') {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('err').style.display = 'block';
      document.getElementById('err').textContent = 'Could not load data — request timed out. Please check your Apps Script deployment.';
    }
  }, 15000);
  var script = document.createElement('script');
  script.src = SCRIPT_URL + '?token=' + TOKEN + '&callback=dashboardCallback';
  document.head.appendChild(script);
}
load();
</script>
</body>
</html>
